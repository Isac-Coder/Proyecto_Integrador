services:
  postgres:
    image: postgres:17

    container_name: zoe-care-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: zoe_care_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: