services:
  - type: web
    name: zoecare-backend
    runtime: node
    rootDir: Back
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://tu-frontend.onrender.com
