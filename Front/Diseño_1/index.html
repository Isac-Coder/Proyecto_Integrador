<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOE-CARE - Iniciar Sesión</title>
    <!-- Importación de la fuente tipográfica -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Panel Izquierdo: Galáctico Lila Oscuro -->
    <div class="left-panel">
        <h1 class="brand-title">ZOE <span>CARE</span></h1>
        <p class="brand-subtitle">El control del cuidado en tus manos.</p>
        
        <div class="feature-box">Recordatorios de medicación precisos</div>
        <div class="feature-box">Registro clínico de síntomas y constantes</div>
        <div class="feature-box">Contacto directo con tu personal de enfermería</div>
    </div>

    <!-- Panel Derecho: Formulario Corporativo Limpio -->
    <div class="right-panel">
        <h2 class="login-title">Bienvenido</h2>
        <p class="login-subtitle">Introduce tus datos para acceder a tu cuenta.</p>

        <form onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <label class="checkbox-container">
                    <input type="checkbox"> Recordarme
                </label>
                <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
            </div>

            <button type="submit" class="submit-btn">Iniciar Sesión</button>
        </form>

        <p class="register-text">¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
    </div>

</body>
</html>
